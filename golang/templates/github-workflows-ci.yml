# CI gate. The single source of truth is the committed Makefile: this workflow
# is a thin caller that runs the SAME `make verify` you run locally.
# Contract and target details: ../operations/ci-and-release.md
#
# NOT on GitHub? Replicate the one meaningful step (`make verify`) in your CI of
# choice (GitLab CI, Buildkite, etc.). The Makefile is the portable contract;
# everything below is just GitHub-specific plumbing around it.
#
# Destination: .github/workflows/ci.yml

name: ci

on:
  push:
    branches: [main] # default branch only; PR builds cover the rest
  pull_request:

# Least privilege. Read source; grant nothing else. Add scopes per-job only when
# a job genuinely needs them (e.g. release publishing).
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod # single source of truth for the Go version
          cache: true # build + module cache, keyed off go.sum
      - run: make verify # the entire gate: tidy/fmt-check/lint/vet/test/race/vuln/build
