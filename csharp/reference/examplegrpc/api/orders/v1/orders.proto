// orders.v1 is the versioned wire contract for the orders service. The package
// and directory stay versioned even at v1 (csharp/services/grpc-services.md).
// Messages are transport DTOs, not database tables; domain logic lives in
// Orders.Grpc.Core, never in generated types. Stubs are generated by
// Grpc.Tools at build time into obj/ - nothing generated is committed.
syntax = "proto3";

package orders.v1;

import "google/protobuf/timestamp.proto";

// Generated types land under the host project's namespace, versioned. The
// governing doc's pattern is <Host>.Grpc.V1; the host here is already named
// Orders.Grpc.Api, so the "Grpc" segment is not repeated.
option csharp_namespace = "Orders.Grpc.Api.V1";

// OrdersService manages orders within the caller's tenant. The tenant is
// resolved from the authenticated principal on the server, never carried in a
// request field, so a caller cannot address another tenant's data.
service OrdersService {
  // CreateOrder creates an order. Returns ALREADY_EXISTS when the tenant
  // already has an order with the same external_reference, and
  // INVALID_ARGUMENT (with a google.rpc.BadRequest detail listing the field
  // violations) on validation failure.
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  // GetOrder returns an order by id, or NOT_FOUND. A cross-tenant read is
  // NOT_FOUND too - another tenant's order is indistinguishable from a
  // missing one.
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  // ListOrders returns one keyset-paginated page of the tenant's orders.
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  // StreamOrders server-streams every order in the caller's tenant in the
  // stable (created_at, id) order. The stream honors the call deadline and
  // client cancellation; the server pages the store internally so no
  // unbounded snapshot is materialized.
  rpc StreamOrders(StreamOrdersRequest) returns (stream StreamOrdersResponse);
}

// Order is the wire representation of an order. The tenant id is never on the
// wire: it is an internal scoping concern resolved from the principal.
message Order {
  // Server-generated order id (UUID).
  string id = 1;
  // Client-supplied reference, unique per tenant.
  string external_reference = 2;
  string customer_id = 3;
  int32 quantity = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CreateOrderRequest {
  string external_reference = 1;
  string customer_id = 2;
  int32 quantity = 3;
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message ListOrdersRequest {
  // page_size is the maximum number of orders to return. The server clamps it
  // to a default when unset (0) and to a maximum when too large.
  int32 page_size = 1;
  // page_token is the opaque cursor returned as next_page_token by a prior
  // call. Empty starts from the beginning. A malformed token is
  // INVALID_ARGUMENT.
  string page_token = 2;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  // next_page_token is the cursor for the next page, or empty on the last page.
  string next_page_token = 2;
}

message StreamOrdersRequest {
}

message StreamOrdersResponse {
  Order order = 1;
}
